name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
          SQLX_OFFLINE: 'true'
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mizu ${{ github.ref_name }}
          releaseBody: See the assets to download and install this version.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-update-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
        continue-on-error: true

      - uses: actions/checkout@v4
        with:
          path: src-repo

      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          gh release view "$TAG" --repo ${{ github.repository }} --json assets -q '.assets[].name' > /tmp/asset-names.txt
          mkdir -p stable
          # Generate latest.json from the release
          VERSION=${TAG#v}
          RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          # Fetch signatures for each platform
          DMG_SIG=$(gh release download "$TAG" --repo ${{ github.repository }} --pattern "*.dmg.sig" --output - 2>/dev/null | head -1 || echo "")
          EXE_SIG=$(gh release download "$TAG" --repo ${{ github.repository }} --pattern "*setup*.exe.sig" --output - 2>/dev/null | head -1 || echo "")
          APPIMAGE_SIG=$(gh release download "$TAG" --repo ${{ github.repository }} --pattern "*.AppImage.sig" --output - 2>/dev/null | head -1 || echo "")

          REPO=${{ github.repository }}
          REPO_URL="https://github.com/${REPO}/releases/download/${TAG}"

          cat > stable/latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See https://github.com/${REPO}/releases/tag/${TAG}",
            "pub_date": "${RELEASE_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "url": "${REPO_URL}/mizu_${VERSION}_aarch64.dmg",
                "signature": "${DMG_SIG}"
              },
              "darwin-x86_64": {
                "url": "${REPO_URL}/mizu_${VERSION}_x64.dmg",
                "signature": "${DMG_SIG}"
              },
              "windows-x86_64": {
                "url": "${REPO_URL}/mizu_${VERSION}_x64-setup.exe",
                "signature": "${EXE_SIG}"
              },
              "linux-x86_64": {
                "url": "${REPO_URL}/mizu_${VERSION}_amd64.AppImage",
                "signature": "${APPIMAGE_SIG}"
              }
            }
          }
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          keep_files: true
